name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────
  # JOB 1 : Lint
  # ─────────────────────────────────────────
  lint:
    name: 🔍 Lint (flake8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements/base.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 src/ tests/ --config=.flake8

  # ─────────────────────────────────────────
  # JOB 2 : Tests
  # ─────────────────────────────────────────
  tests:
    name: 🧪 Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint

    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PYTHONPATH: ${{ github.workspace }}
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements/base.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements/base.txt
          pip install -r requirements/api.txt
          pip install pytest pytest-cov pytest-asyncio
          pip install fastapi httpx PyPDF2 pdfplumber psycopg2-binary sentence-transformers joblib spacy xgboost scikit-learn
          python -m spacy download fr_core_news_sm
          python -m spacy download en_core_web_sm

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --ignore=tests/test_database.py \
            --ignore=tests/test_vector_store.py \
            --tb=short


      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml 

  # ─────────────────────────────────────────
  # JOB 3 : Build Docker
  # ─────────────────────────────────────────
  build:
    name: 🐳 Build Docker
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container 
          install: true

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/api.Dockerfile
          push: false
          tags: ai-career-coach-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Streamlit image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/streamlit.Dockerfile
          push: false
          provenance: false 
          tags: ai-career-coach-streamlit:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Scheduler image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/api.Dockerfile   # même image que l'API
          push: false
          provenance: false
          tags: ai-career-coach-scheduler:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # JOB 4 : Deploy 
  # ─────────────────────────────────────────
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    env:
      BUILDX_NO_DEFAULT_ATTESTATIONS: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          install: true
          buildkitd-flags: --debug

      - name: Format Docker Hub username
        id: format_username
        run: |
          # Conversion en minuscules et nettoyage
          RAW_USERNAME="${{ secrets.DOCKER_USERNAME }}"
          CLEAN_USERNAME=$(echo "${RAW_USERNAME}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9._-]//g')
          echo "DOCKER_USERNAME_CLEAN=${CLEAN_USERNAME}" >> ${GITHUB_ENV}
          echo " Nom formaté : ${CLEAN_USERNAME}"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          logout: true
        
      - name: Verify Docker Hub connection
        run: |
          docker info
          echo " Connexion Docker Hub établie"

      - name: Build and Push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/api.Dockerfile
          outputs: type=registry,compression=zstd,force-compression=true
          tags: |
            ${{ env.DOCKER_USERNAME_CLEAN }}/ai-career-coach-api:latest
            ${{ env.DOCKER_USERNAME_CLEAN }}/ai-career-coach-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Build and Push Streamlit image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/streamlit.Dockerfile
          outputs: type=registry,compression=zstd,force-compression=true
          tags: |
            ${{ env.DOCKER_USERNAME_CLEAN }}/ai-career-coach-streamlit:latest
            ${{ env.DOCKER_USERNAME_CLEAN }}/ai-career-coach-streamlit:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Deploy success notification
        run: |
          echo " Déploiement réussi pour le commit ${{ github.sha }}"
          echo "Images poussées sur Docker Hub :"
          echo "  - ${{ env.DOCKER_USERNAME_CLEAN }}/ai-career-coach-api:latest"
          echo "  - ${{ env.DOCKER_USERNAME_CLEAN }}/ai-career-coach-streamlit:latest"